<!DOCTYPE html>
<html>
  <head>
    <title>
      TodoList
    </title>
    <link rel="stylesheet" href="./styles/style.css">
  </head>
  <body>
    <div class="main-container">
      <div class="main-left-section">
        <div class="header-section">
          <div class="left-section">
            <div class="title-logo-section">
              <img class="main-logo" src="./images/trophy-svgrepo-com.svg">
              <p class="main-title">
                Glory
              </p>
            </div>
            <div class="input-container">
              <img class="search-icon" src="./images/search-svgrepo-com.svg">
              <input class="input-search-here" type="text" placeholder="Search here">
            </div>
          </div>
          <div class="right-section">
            <div class="menu-deroulant-container">
              <div>
                <p>
                  Home
                </p>
              </div>
              <div>
                <p>
                  Home
                </p>
              </div>
              <div>
                <p>
                  Home
                </p>
              </div>
              <div>
                <p>
                  Home
                </p>
              </div>
            </div>
          </div>
        </div>
        <div>
          <p class="salutation-text">
            Hey Mus!
          </p>
          <p class="welcome-text">
            Welcome Back
          </p>
        </div>
        <div class="todolist-section">
          <div class="todolist-control-section">
            <div class="header-todolist-control-section">
              <div class="text-header-todolist-control">
                <p class="todo-management-text">
                  TodoList Management
                </p>
                <p class="todo-management-description-text">
                  Change / Delete / Modify todolist
                </p>
              </div>
              <img src="./images/icons8-synchronize.svg" class="synchronize-logo">
            </div>

            <div class="add-box-container">
              <div class="header-container-add">
                <div class="circle">
                  <img src="./images/add-circle-svgrepo-com.svg" class="add-logo">
                </div>
                <div class="title-add-section">
                  <p class="box-title">
                    Add Task
                  </p>
                  <div class="line"></div>
                  <button class="add-button">
                    Add Task
                  </button>
                </div>
              </div>
              <div class="description-text-add">
                <p>
                  Add a task to todoList
                </p>
              </div>
              <div class="big-line"></div>
              <div class="name-add-section">
                <div class="left-add-section">
                  <p class="name-add-section-text">
                    Name
                  </p>
                  <img src="./images/user-svgrepo-com.svg" class="add-user-icons">
                </div>
                <div>
                  <input type="text" placeholder="task name" class="task-name-input">
                </div>
              </div>
              <div class="big-line"></div>
              <div class="date-section-add">
                <p class="date-add-section-text">
                  Date
                </p>
                <img src="./images/date-range-svgrepo-com.svg" class="add-date-icons">
                <div class="vertical-line-input"></div>
                <div class="input-date-container">
                  <input type="date" class="date-input-add">
                </div>
                <div class="vertical-line-input"></div>
              </div>
              <div class="big-line"></div>
              <div class="priority-section-add">
                <p class="priority-add-section-text">
                  Priority
                </p>
                <img src="./images/priority-svgrepo-com.svg" class="add-prio-icons">
                <div class="vertical-line-input"></div>
                <div class="button-container-section">
                  <div class="small-circle-left js-around-button-1 color-circle-green"></div>
                  <div class="middle-circle-left js-around-button-2 color-circle-green"></div>
                  <div class="big-circle-left js-around-button-3 color-circle-green"></div>
                  <button class="green-low-priority-button js-priority-button" onclick="
                    priorityChangement();
                  ">
                    Low
                  </button>
                  <div class="big-circle js-around-button-4 color-circle-green"></div>
                  <div class="middle-circle js-around-button-5 color-circle-green"></div>
                  <div class="small-circle js-around-button-6 color-circle-green"></div>
                </div>
                <div class="vertical-line-input"></div>
                <div class="decor-section-prio">
                  <div class="subdecor-section-prio">
                    <div class="green-point-container"></div>
                    <p class="little-low">Low</p>
                  </div>
                  <div class="subdecor-section-prio">
                    <div class="orange-point-container"></div>
                    <p class="little-low">Medium</p>
                  </div>
                  <div class="subdecor-section-prio">
                    <div class="red-point-container"></div>
                    <p class="little-low">High</p>
                  </div>
                </div>
              </div>
            </div>
            <div class="delete-box-container">
              <div class="header-container-delete">
                <div class="circle">
                  <img src="./images/delete-svgrepo-com.svg" class="add-logo">
                </div>
                <div class="title-delete-section">
                  <p class="box-title">
                    Remove Task
                  </p>
                  <div class="line"></div>
                  <button class="remove-all-button">
                    Remove Task
                  </button>
                </div>
              </div>
              <div class="description-text-delete">
                <p>
                  Delete all task to todoList
                </p>
              </div>
            </div>
          </div>
          <div class="todolist-task-section js-todo"></div>
        </div>
      </div>
      <div class="main-right-section">p</div>
    </div>


    <p class="put-text"></p>
    <script src="./scripts/todo.js"></script>
  </body>
</html>
